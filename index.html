<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.5;
      color: #0b2545;
    }

    /* soft modern reset */
    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.8rem;
    }

    /* header / nav */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.8rem 0;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #1e3c72, #2b5876);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      font-weight: 500;
      color: #2d3b4f;
    }

    .nav-links a {
      transition: color 0.2s ease;
      font-size: 1.1rem;
    }

    .nav-links a:hover {
      color: #0f2b4f;
      border-bottom: 2px solid #2b5876;
      padding-bottom: 0.2rem;
    }

    /* hero section */
    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 3rem;
      margin: 3rem 0 5rem 0;
    }

    .hero-content {
      flex: 1 1 400px;
    }

    .hero-badge {
      display: inline-block;
      background: #e6edf6;
      color: #1e3c72;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      margin-bottom: 1.2rem;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: 3.4rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #0b2545;
      margin-bottom: 1.2rem;
    }

    .hero-highlight {
      color: #2b5f8a;
      border-bottom: 4px solid rgba(43, 88, 118, 0.25);
    }

    .hero-content p {
      font-size: 1.2rem;
      color: #2d3f55;
      max-width: 500px;
      margin-bottom: 2rem;
    }

    .cta-group {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #1e3c72;
      color: white;
      padding: 0.9rem 2.4rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.05rem;
      border: none;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 8px 16px -8px rgba(20, 40, 70, 0.3);
    }

    .btn-primary:hover {
      background: #143157;
      cursor: pointer;
      transform: scale(1.02);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #1e3c72;
      color: #1e3c72;
      padding: 0.9rem 2.4rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.05rem;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-outline:hover {
      background: #e9f0f9;
    }

    .hero-avatar {
      flex: 0 0 300px;
      text-align: center;
    }

    .avatar-box {
      background: linear-gradient(145deg, #dce9f5, #ffffff);
      border-radius: 40% 60% 40% 60% / 50% 40% 60% 50%;
      padding: 0.8rem;
      box-shadow: 0 30px 40px -20px rgba(0,20,40,0.3);
    }

    .avatar-box img {
      border-radius: inherit;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      filter: grayscale(10%) contrast(1.05);
    }

    /* fallback avatar text if image doesn't load */
    .avatar-fallback {
      background: #2b5876;
      color: white;
      font-size: 5rem;
      font-weight: 600;
      width: 280px;
      height: 280px;
      border-radius: 38% 62% 42% 58% / 52% 44% 56% 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    /* social proof / featured */
    .featured-on {
      margin: 4rem 0 2.5rem 0;
      text-align: center;
    }

    .featured-on p {
      color: #4b5f77;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }

    .brand-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3rem;
      align-items: center;
      opacity: 0.7;
      font-size: 1.3rem;
      font-weight: 500;
      color: #335577;
    }

    .brand-strip span {
      white-space: nowrap;
    }

    /* selected work */
    .section-title {
      font-size: 2.2rem;
      font-weight: 600;
      margin: 4rem 0 1rem 0;
      letter-spacing: -0.02em;
      color: #0a1e33;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-title i {
      color: #1e3c72;
      font-size: 2rem;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 2rem;
      margin: 2rem 0 3rem;
    }

    .project-card {
      background: white;
      border-radius: 1.8rem;
      padding: 1.8rem 1.5rem 1.8rem 1.5rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.03);
      transition: all 0.2s ease;
      border: 1px solid rgba(43, 88, 118, 0.08);
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 35px -12px rgba(20, 60, 100, 0.15);
      border-color: rgba(43, 88, 118, 0.2);
    }

    .card-icon {
      background: #ecf3fa;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      color: #1e3c72;
      font-size: 2rem;
    }

    .project-card h3 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .project-card p {
      color: #2f4059;
      margin-bottom: 1.5rem;
    }

    .tag-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      background: #eef4fa;
      color: #1e3c72;
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* about teaser */
    .about-teaser {
      background: #e5eff9;
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      margin: 4rem 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 2.5rem;
    }

    .about-text {
      flex: 2 1 300px;
    }

    .about-text h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #0b2545;
    }

    .about-text p {
      font-size: 1.2rem;
      color: #1a314b;
      max-width: 650px;
    }

    .about-highlight {
      display: flex;
      gap: 2.5rem;
      margin-top: 2rem;
    }

    .highlight-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 500;
    }

    .highlight-item i {
      background: #2b5876;
      color: white;
      border-radius: 50%;
      padding: 0.5rem;
      font-size: 0.9rem;
    }

    .about-image {
      flex: 1 1 180px;
      text-align: center;
    }

    .about-image i {
      font-size: 6rem;
      color: #1e3c72;
      opacity: 0.8;
    }

    /* footer + contact */
    .footer {
      margin: 5rem 0 2.5rem 0;
      border-top: 1px solid #cedcec;
      padding-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1.8rem;
    }

    .social-links {
      display: flex;
      gap: 2rem;
      font-size: 1.7rem;
      color: #1e3c72;
    }

    .social-links a {
      transition: color 0.15s, transform 0.1s;
    }

    .social-links a:hover {
      color: #0b2545;
      transform: translateY(-3px);
    }

    .contact-email {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #e3edf5;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .contact-email i {
      font-size: 1.3rem;
      color: #1e3c72;
    }

    .copyright {
      text-align: center;
      color: #4c607c;
      font-size: 0.95rem;
      margin: 2rem 0 0.5rem;
    }

    /* responsive touches */
    @media (max-width: 600px) {
      .hero-content h1 {
        font-size: 2.5rem;
      }
      .navbar {
        flex-direction: column;
        align-items: start;
      }
      .nav-links {
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .brand-strip {
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- header navigation -->
    <header>
      <nav class="navbar">
        <span class="logo">Portfolio</span>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About Us</a>
          <a href="contact.html">contact</a>
          <a href="education.html">Education</a>
         
        
        </div>
      </nav>
    </header>

    <!-- hero section (homepage headline) -->
    <section class="hero">
      <div class="hero-content">
        
        <h1>
          Creativity is a <span class="hero-highlight"> Inteligence</span> 
        </h1>
        <p>
          I’m Alwin — designer & front-end thinker. 
        </p>
        
         
      
      </div>

      <div class="hero-avatar">
        <div class="avatar-box">

        </div>
        </div>
      </div>
    </section>
  </body>
</html>
