<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simple page · header & footer</title>
  <style>
    /* tiny reset / base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fc;
      color: #1e2f44;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== HEADER styles (simple, clean) ===== */
    .site-header {
      background: white;
      padding: 1rem 2rem;
      border-bottom: 1px solid #ccdbe9;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1f3a5f;
      letter-spacing: -0.5px;
    }

    .nav {
      display: flex;
      gap: 2rem;
    }

    .nav a {
      text-decoration: none;
      color: #1f3a5f;
      font-weight: 500;
      font-size: 1.1rem;
      padding-bottom: 0.2rem;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .nav a:hover {
      border-bottom-color: #4870a3;
    }

    /* active / current page style (optional) */
    .nav a.active {
      border-bottom-color: #1f3a5f;
    }

    /* ===== MAIN content area ===== */
    .main-content {
      flex: 1;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 2rem;
      width: 100%;
    }

    .content-card {
      background: white;
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .content-card h1 {
      font-size: 2.6rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: #0a1f33;
    }

    .content-card p {
      font-size: 1.2rem;
      color: #2b4466;
      max-width: 550px;
      margin: 1rem auto;
    }

    .btn {
      display: inline-block;
      background: #1f3a5f;
      color: white;
      text-decoration: none;
      padding: 0.8rem 2.2rem;
      border-radius: 40px;
      font-weight: 500;
      margin-top: 1.2rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #0e2a46;
    }

    /* ===== FOOTER styles (simple, matching) ===== */
    .site-footer {
      background: white;
      border-top: 1px solid #ccdbe9;
      padding: 1.5rem 2rem;
      margin-top: auto;
    }

    .footer-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      color: #365477;
    }

    .footer-links {
      display: flex;
      gap: 2rem;
    }

    .footer-links a {
      color: #1f3a5f;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px dotted transparent;
    }

    .footer-links a:hover {
      border-bottom-color: #1f3a5f;
    }

    .copyright {
      font-size: 0.9rem;
      color: #5d728b;
    }

    /* responsive for small */
    @media (max-width: 500px) {
      .header-inner, .footer-inner {
        flex-direction: column;
        text-align: center;
      }
      .nav {
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- === HEADER (simple, with index link) === -->
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">Alwin</span>
      <nav class="nav">
        <!-- here is the index link you asked for -->
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="education.html">Education</a>
        <a href="contact.html">Contact</a>
        
      </nav>
    </div>
  </header>

  <!-- === MAIN PAGE CONTENT (just a sample) === -->
  <main class="main-content">
    <div class="content-card">
      <h1>About Us</h1>
      <p>
        I am  Computer Science student with a strong interest in technology, programming, and problem-solving. I enjoy learning about software development, data structures, and modern computing technologies. 
      </p>
      
    </div>
  </main>
</body>
</html>
